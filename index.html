<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospecta | Bóveda de Contenido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lead-magnet-card {
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.1);
        }

        /* Animación en Cascada */
        .card-entry {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 0.6s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .accordion-open .accordion-content {
            max-height: 500px;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <header class="py-12 text-center">
        <div class="inline-block px-6 py-2 glass-card rounded-full mb-4">
            <span class="flex items-center gap-2 text-xs font-bold tracking-[0.3em] uppercase text-purple-400">
                <span class="w-2 h-2 bg-purple-500 rounded-full animate-ping"></span>
                Sincronizado con Notion
            </span>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tighter text-white lg:text-7xl">PROSPECTA<span class="text-purple-500">.</span></h1>
        <p class="mt-4 text-slate-400 font-light text-lg">Tu ecosistema de contenido estratégico y lead magnets.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="loader" class="col-span-full flex flex-col items-center py-20">
                <div class="w-12 h-12 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
                <p class="mt-4 text-slate-500 animate-pulse">Abriendo la bóveda...</p>
            </div>
        </div>
    </main>

    <script>
        const BRIDGE_URL = "https://hook.us2.make.com/8xkugymgxu15kgs9tnrchluhk88xp42r";
        const grid = document.getElementById('main-grid');
        const loader = document.getElementById('loader');

        async function initBoveda() {
            try {
                const response = await fetch(BRIDGE_URL);
                const results = await response.json();
                
                loader.style.display = 'none';

                results.forEach((item, index) => {
                    const props = item.properties;
                    
                    // Mapeo de datos (Ajustado a tus columnas exactas)
                    const nombre = props["Nombre"]?.title[0]?.plain_text || "Sin nombre";
                    const platform = props["Plataforma"]?.select?.name || "General";
                    const isLeadMagnet = props["¿Es Lead Magnet?"]?.checkbox || false;
                    const content = props["Contenido"]?.rich_text[0]?.plain_text || "Sin descripción disponible.";
                    const actionLink = props["Link de Acción"]?.url || "#";
                    const clics = props["Clics Históricos"]?.number || 0;
                    const mediaUrl = props["URL Multimedia"]?.url || "";

                    // Crear Tarjeta
                    const card = document.createElement('div');
                    card.className = `glass-card p-6 rounded-[2rem] card-entry ${isLeadMagnet ? 'lead-magnet-card' : ''}`;
                    card.style.animationDelay = `${index * 0.1}s`; // EFECTO CASCADA

                    card.innerHTML = `
                        <div class="flex flex-col h-full">
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">${platform}</span>
                                <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400">
                                    <svg class="w-3 h-3 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                    ${clics} clics
                                </div>
                            </div>

                            <h3 class="text-2xl font-bold text-white mb-4 leading-tight">${nombre}</h3>
                            
                            <div class="cursor-pointer group" onclick="this.parentElement.parentElement.classList.toggle('accordion-open')">
                                <p class="text-slate-400 text-sm leading-relaxed mb-4 line-clamp-2 group-hover:text-slate-200 transition-colors">
                                    ${content}
                                </p>
                                <div class="accordion-content">
                                    <p class="text-slate-400 text-sm leading-relaxed pb-4 border-b border-white/5">
                                        ${content}
                                    </p>
                                </div>
                            </div>

                            <div class="mt-auto pt-6">
                                <a href="${actionLink}" target="_blank" 
                                   class="flex items-center justify-center gap-2 w-full py-4 rounded-2xl bg-white text-black font-extrabold text-sm hover:bg-purple-500 hover:text-white transition-all transform active:scale-95">
                                    ${isLeadMagnet ? 'DESCARGAR AHORA' : 'VER MÁS'}
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                                </a>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Error cargando la bóveda:", error);
                loader.innerHTML = "<p class='text-red-500'>Error de conexión. Verifica tu puente en Make.</p>";
            }
        }

        initBoveda();
    </script>
</body>
</html>
